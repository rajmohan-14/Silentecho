<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SilentEcho</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/htmx.org@1.9.10"></script>
  <style>
    .htmx-indicator { display: none; }
    .htmx-request .htmx-indicator { display: flex; }
    .htmx-request.htmx-indicator { display: flex; }
  </style>
</head>
<body class="bg-zinc-950 text-zinc-100 min-h-screen font-sans">

  <!-- Navbar -->
  <nav class="border-b border-zinc-800 px-4 md:px-6 py-4 flex justify-between items-center sticky top-0 bg-zinc-950/90 backdrop-blur z-50">
    <a href="{% url 'feed' %}" class="text-xl font-serif tracking-tight flex items-center gap-2">
      <span class="inline-block w-2 h-2 rounded-full bg-purple-400 animate-pulse"></span>
      SilentEcho
    </a>
    <div class="flex items-center gap-2 md:gap-3">
      <!-- HTMX loading spinner -->
      <div id="htmx-spinner" class="htmx-indicator items-center">
        <div class="w-4 h-4 border-2 border-purple-400 border-t-transparent rounded-full animate-spin"></div>
      </div>
      <a href="{% url 'submit_post' %}" class="bg-purple-500 hover:bg-purple-400 text-black text-xs md:text-sm font-medium px-3 md:px-4 py-2 rounded-lg transition">
        + Share
      </a>
      <a href="{% url 'mod_dashboard' %}" class="text-zinc-500 hover:text-zinc-300 text-xs md:text-sm transition hidden md:block">
        Mod
      </a>
    </div>
  </nav>

  <!-- Main content -->
  <main class="max-w-5xl mx-auto px-4 py-6 md:py-8">
    {% block content %}{% endblock %}
  </main>

  <!-- Mobile bottom nav -->
  <nav class="fixed bottom-0 left-0 right-0 bg-zinc-950/95 border-t border-zinc-800 px-6 py-3 flex justify-around items-center md:hidden z-50">
    <a href="{% url 'feed' %}" class="flex flex-col items-center gap-1 text-zinc-400 hover:text-zinc-100 transition">
      <span class="text-lg">🏠</span>
      <span class="text-xs">Feed</span>
    </a>
    <a href="{% url 'submit_post' %}" class="flex flex-col items-center gap-1 text-purple-400 hover:text-purple-300 transition">
      <span class="text-lg">✏️</span>
      <span class="text-xs">Share</span>
    </a>
    <a href="{% url 'mod_dashboard' %}" class="flex flex-col items-center gap-1 text-zinc-400 hover:text-zinc-100 transition">
      <span class="text-lg">🔍</span>
      <span class="text-xs">Mod</span>
    </a>
  </nav>

  <!-- Bottom padding so content doesn't hide behind mobile nav -->
  <div class="h-16 md:hidden"></div>

</body>
</html>
