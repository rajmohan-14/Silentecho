{% for reply in replies %}
<div class="bg-zinc-900 border border-zinc-800 rounded-xl p-4 mb-3" id="reply-{{ reply.id }}">
  <p class="text-zinc-300 text-sm leading-relaxed mb-3">{{ reply.content }}</p>
  <div class="flex items-center justify-between">
    <span class="text-xs text-zinc-600">{{ reply.created_at|timesince }} ago</span>
    <button
      onclick="voteHelpful({{ reply.id }}, this)"
      class="text-xs border border-zinc-700 hover:border-green-500 hover:text-green-400 text-zinc-500 px-3 py-1 rounded-lg transition"
    >
      ✦ Helpful (<span id="votes-{{ reply.id }}">{{ reply.helpful_votes }}</span>)
    </button>
  </div>
</div>
{% empty %}
<div class="flex flex-col items-center justify-center py-8 text-center">
  <div class="text-3xl mb-3">🤍</div>
  <p class="text-zinc-500 text-sm font-medium mb-1">No replies yet</p>
  <p class="text-zinc-600 text-xs">
    Be the first to offer support. A few kind words can mean everything.
  </p>
</div>
{% endfor %}
